name: TEMP Korea courts runner

on:
  push:
    paths:
      - 'temp_korea_courts/build.py'
      - '.github/workflows/temp-korea-courts.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install data-build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests rapidfuzz geopandas shapely pyarrow admdongkor playwright
          python -m playwright install --with-deps chromium

      - name: Build nationwide court catalog
        id: build
        shell: bash
        run: |
          set +e
          rm -rf temp_korea_courts/output
          python temp_korea_courts/build.py
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write run metadata
        if: always()
        env:
          BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: |
          mkdir -p temp_korea_courts/output
          python - <<'PY'
          import json, os
          from pathlib import Path
          out = Path('temp_korea_courts/output')
          files = []
          for p in sorted(out.rglob('*')):
              if p.is_file():
                  files.append({'path': str(p.relative_to(out)), 'bytes': p.stat().st_size})
          meta = {
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'run_number': int(os.environ['GITHUB_RUN_NUMBER']),
              'repository': os.environ['GITHUB_REPOSITORY'],
              'sha': os.environ['GITHUB_SHA'],
              'artifact_name': 'rankball-korea-courts',
              'build_exit_code': int(os.environ.get('BUILD_EXIT_CODE') or 999),
              'files': files,
          }
          (out / 'run_meta.json').write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Upload complete output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankball-korea-courts
          path: temp_korea_courts/output
          if-no-files-found: warn
          retention-days: 1
          compression-level: 6

      - name: Commit small status files
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f temp_korea_courts/output/run_meta.json
          test -f temp_korea_courts/output/status.json && git add -f temp_korea_courts/output/status.json || true
          test -f temp_korea_courts/output/rankball_korea_courts_summary.json && git add -f temp_korea_courts/output/rankball_korea_courts_summary.json || true
          test -f temp_korea_courts/output/raw/data_go_kr_debug.json && git add -f temp_korea_courts/output/raw/data_go_kr_debug.json || true
          git commit -m 'temp: build nationwide Korea court catalog' || exit 0
          git push
