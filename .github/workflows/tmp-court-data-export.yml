name: Temporary nationwide court data export

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tmp-court-data-export.yml"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decode collector
        run: |
          mkdir -p /tmp/court-export
          base64 -d tmp/court-export/collector.py.gz.b64 | gzip -d > /tmp/court-export/collector.py
          python -m py_compile /tmp/court-export/collector.py

      - name: Collect public data and OSM
        id: collect
        continue-on-error: true
        run: python /tmp/court-export/collector.py --output-dir court_export

      - name: Package temporary results
        if: always()
        run: |
          rm -rf tmp/court-export/results
          mkdir -p tmp/court-export/results
          tar -czf /tmp/korea-basketball-courts.tar.gz -C court_export .
          base64 -w 0 /tmp/korea-basketball-courts.tar.gz > /tmp/korea-basketball-courts.tar.gz.b64
          split -b 400k -d -a 3 /tmp/korea-basketball-courts.tar.gz.b64 tmp/court-export/results/part-
          sha256sum /tmp/korea-basketball-courts.tar.gz > tmp/court-export/results/archive.sha256
          wc -c /tmp/korea-basketball-courts.tar.gz /tmp/korea-basketball-courts.tar.gz.b64 > tmp/court-export/results/archive.size

      - name: Commit temporary results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp/court-export/results
          git commit -m "chore: store temporary court export results" || exit 0
          git push

      - name: Fail after results are stored
        if: steps.collect.outcome == 'failure'
        run: exit 1
